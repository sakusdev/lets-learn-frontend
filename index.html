<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Learn</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fdfdfd; color: #333; }
        #root-view { width: 100%; min-height: 100vh; }
    </style>
</head>
<body>

    <div id="root-view">読み込み中...</div>

    <script>
        async function dispatcher(queryString = window.location.search) {
            const container = document.getElementById('root-view');
            try {
                const response = await fetch(`/api/check${queryString}`);
                const htmlContent = await response.text();
                
                container.innerHTML = htmlContent;

                Array.from(container.querySelectorAll("script")).forEach(oldScript => {
                    const newScript = document.createElement("script");
                    newScript.text = oldScript.text;
                    if (oldScript.src) newScript.src = oldScript.src; 
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (err) {
                container.innerHTML = '<h1>500 Internal Server Error</h1>';
            }
        }

        window.executeDispatch = dispatcher;
        dispatcher();
    </script>
</body>
</html>
